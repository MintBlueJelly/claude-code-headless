name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write # create version tags
  packages: write # push image to ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history + tags for version calculation

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute the next semver from Conventional Commits since the last tag.
      # dry_run: the tag is NOT created yet, so a failed build never leaves an
      # orphan version tag. Bump rules: feat! / BREAKING CHANGE -> major,
      # feat -> minor, anything else (fix, chore, …) -> patch.
      - name: Compute next version
        id: ver
        if: github.event_name != 'pull_request'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          dry_run: true

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.ver.outputs.new_version }},enable=${{ steps.ver.outputs.new_version != '' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: claude-code-headless.dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Only now, after a successful build+push, create & push the git tag.
      # custom_tag pins it to the version computed above (no recompute drift).
      - name: Create version tag
        if: github.event_name != 'pull_request' && success()
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.ver.outputs.new_version }}

      # Publish a GitHub Release for that tag, using the auto-generated changelog.
      - name: Create GitHub release
        if: github.event_name != 'pull_request' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.new_tag }}
          name: ${{ steps.ver.outputs.new_tag }}
          body: |
            ${{ steps.ver.outputs.changelog }}

            **Image:** `ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.new_version }}`
